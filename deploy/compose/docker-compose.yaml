services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: orders
      POSTGRES_PASSWORD: orders
      POSTGRES_DB: orders
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orders"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  order-service:
    build: ../../services/order-service
    restart: on-failure
    environment:
      DATABASE_URL: postgresql://orders:orders@postgres:5432/orders
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  outbox-relay:
    build: ../../services/order-service
    command: ["python", "-m", "app.outbox_relay"]
    restart: on-failure
    environment:
      DATABASE_URL: postgresql://orders:orders@postgres:5432/orders
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/%2F
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  status-consumer:
    build: ../../services/order-service
    command: ["python", "-m", "app.status_consumer"]
    restart: on-failure
    environment:
      DATABASE_URL: postgresql://orders:orders@postgres:5432/orders
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/%2F
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  inventory-worker:
    build: ../../services/workers
    command: ["python", "-m", "app.inventory"]
    restart: on-failure
    environment:
      DATABASE_URL: postgresql://orders:orders@postgres:5432/orders
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/%2F
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  payment-worker:
    build: ../../services/workers
    command: ["python", "-m", "app.payment"]
    restart: on-failure
    environment:
      DATABASE_URL: postgresql://orders:orders@postgres:5432/orders
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/%2F
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-worker:
    build: ../../services/workers
    command: ["python", "-m", "app.notification"]
    restart: on-failure
    environment:
      DATABASE_URL: postgresql://orders:orders@postgres:5432/orders
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/%2F
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

apiVersion: apps/v1
kind: Deployment
metadata:
  name: outbox-relay
  namespace: orders
spec:
  replicas: 1
  selector:
    matchLabels:
      app: outbox-relay
  template:
    metadata:
      labels:
        app: outbox-relay
    spec:
      containers:
        - name: outbox-relay
          image: orders/order-service:dev
          imagePullPolicy: Never
          command: ["python", "-m", "app.outbox_relay"]
          ports:
            - name: metrics
              containerPort: 9464
          envFrom:
            - secretRef:
                name: app-credentials
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: status-consumer
  namespace: orders
spec:
  replicas: 1
  selector:
    matchLabels:
      app: status-consumer
  template:
    metadata:
      labels:
        app: status-consumer
    spec:
      containers:
        - name: status-consumer
          image: orders/order-service:dev
          imagePullPolicy: Never
          command: ["python", "-m", "app.status_consumer"]
          ports:
            - name: metrics
              containerPort: 9464
          envFrom:
            - secretRef:
                name: app-credentials
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi

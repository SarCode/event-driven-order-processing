# No liveness probes on consumers: no HTTP surface to probe. Failure modes
# exit the process (see runtime.py reconnect handling) and Kubernetes restarts.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-worker
  namespace: orders
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-worker
  template:
    metadata:
      labels:
        app: inventory-worker
    spec:
      containers:
        - name: inventory-worker
          image: orders/workers:dev
          imagePullPolicy: Never
          command: ["python", "-m", "app.inventory"]
          envFrom:
            - secretRef:
                name: app-credentials
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
